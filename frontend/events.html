<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Events — BookMyShow</title>
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar"></nav>

<!-- Hero -->
<div class="page-wrap">
  <section class="hero">
    <div class="container">
      <div class="hero-eyebrow">✦ Live Events &amp; Experiences</div>
      <h1>Find your next<br><em>great moment</em></h1>
      <p class="hero-sub">From live concerts to comedy nights — book tickets for events happening near you.</p>
      <div class="search-bar">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--muted);flex-shrink:0;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search events, venues, artists..." />
        <button class="btn btn-gold btn-sm" onclick="applyFilters()">Search</button>
      </div>
    </div>
  </section>

  <!-- Filters -->
  <div class="container" style="padding-bottom: 80px;">
    <div class="filters" id="filters-bar">
      <button class="filter-chip active" data-cat="" onclick="selectCat(this, '')">All</button>
      <!-- Categories load here -->
      <div style="flex:1;"></div>
      <select class="filter-select" id="city-filter" onchange="applyFilters()">
        <option value="">All Cities</option>
      </select>
      <select class="filter-select" id="sort-filter" onchange="applyFilters()">
        <option value="">Sort: Default</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="date_asc">Date: Soonest First</option>
      </select>
    </div>

    <!-- Results header -->
    <div class="section-header">
      <h2 id="results-label">Upcoming Events</h2>
      <span id="results-count" class="text-muted text-sm"></span>
    </div>

    <!-- Events grid -->
    <div id="events-grid" class="events-grid">
      <div class="page-loader" style="grid-column:1/-1;">
        <div class="loader"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="static/js/main.js"></script>
<script>
  renderNavbar('events.html');

  let allEvents = [];
  let selectedCat = '';

  async function loadCategories() {
    try {
      const cats = await apiFetch('/events/categories');
      const bar = document.getElementById('filters-bar');
      cats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'filter-chip';
        btn.dataset.cat = c.category_name;
        btn.textContent = categoryEmoji(c.category_name) + ' ' + c.category_name;
        btn.onclick = function() { selectCat(this, c.category_name); };
        // Insert before the flex:1 spacer
        bar.insertBefore(btn, bar.querySelector('[style]'));
      });
    } catch (_) {}
  }

  async function loadCities() {
    try {
      const cities = await apiFetch('/events/cities');
      const sel = document.getElementById('city-filter');
      cities.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.city_name;
        opt.textContent = c.city_name;
        sel.appendChild(opt);
      });
    } catch (_) {}
  }

  async function loadEvents() {
    const city = document.getElementById('city-filter').value;
    const search = document.getElementById('search-input').value.trim();
    const sort = document.getElementById('sort-filter').value;

    let url = '/events?';
    if (selectedCat) url += `category=${encodeURIComponent(selectedCat)}&`;
    if (city) url += `city=${encodeURIComponent(city)}&`;

    const grid = document.getElementById('events-grid');
    grid.innerHTML = '<div class="page-loader" style="grid-column:1/-1;"><div class="loader"></div></div>';

    try {
      let events = await apiFetch(url);

      // Client-side search filter
      if (search) {
        const q = search.toLowerCase();
        events = events.filter(e =>
          e.title.toLowerCase().includes(q) ||
          (e.venue_name && e.venue_name.toLowerCase().includes(q)) ||
          (e.city_name && e.city_name.toLowerCase().includes(q))
        );
      }

      // Sort
      if (sort === 'price_asc') events.sort((a,b) => (a.starting_price||0) - (b.starting_price||0));
      if (sort === 'price_desc') events.sort((a,b) => (b.starting_price||0) - (a.starting_price||0));
      if (sort === 'date_asc') events.sort((a,b) => new Date(a.start_datetime) - new Date(b.start_datetime));

      allEvents = events;
      renderEvents(events);
    } catch (err) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">⚠️</div><h3>Failed to load events</h3><p>${err.message}</p></div>`;
    }
  }

  function renderEvents(events) {
    const grid = document.getElementById('events-grid');
    document.getElementById('results-count').textContent = `${events.length} event${events.length !== 1 ? 's' : ''} found`;

    if (!events.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-state-icon">🔍</div>
          <h3>No events found</h3>
          <p>Try adjusting your search or filters.</p>
          <button class="btn btn-outline btn-sm" onclick="resetFilters()">Clear Filters</button>
        </div>`;
      return;
    }

    grid.innerHTML = events.map(e => `
      <div class="event-card" onclick="window.location.href='event-detail.html?id=${e.event_id}'">
        <div class="event-card-thumb">
          <span class="event-card-category">${e.category_name || 'Event'}</span>
          <span style="font-size:3.5rem; opacity:0.2;">${categoryEmoji(e.category_name)}</span>
        </div>
        <div class="event-card-body">
          <div class="event-card-title">${e.title}</div>
          <div class="event-meta">
            <div class="event-meta-row">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              ${fmtDateShort(e.start_datetime)}
            </div>
            <div class="event-meta-row">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${e.venue_name || '—'} · ${e.city_name || '—'}
            </div>
            <div class="event-meta-row">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>
              ${e.total_available_tickets ?? '?'} tickets left
            </div>
          </div>
        </div>
        <div class="event-card-footer">
          <div>
            <div class="price-from">Starting from</div>
            <div class="price-value">${fmtCurrency(e.starting_price)}</div>
          </div>
          <button class="btn btn-gold btn-sm">Book Now</button>
        </div>
      </div>
    `).join('');
  }

  function selectCat(btn, cat) {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCat = cat;
    applyFilters();
  }

  function applyFilters() { loadEvents(); }

  function resetFilters() {
    selectedCat = '';
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-chip[data-cat=""]').classList.add('active');
    document.getElementById('city-filter').value = '';
    document.getElementById('sort-filter').value = '';
    document.getElementById('search-input').value = '';
    loadEvents();
  }

  // Enter key on search
  document.getElementById('search-input').addEventListener('keyup', (e) => {
    if (e.key === 'Enter') applyFilters();
  });

  // Init
  loadCategories();
  loadCities();
  loadEvents();
</script>
</body>
</html>
