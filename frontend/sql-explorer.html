<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Explorer — BookMyShow</title>
  <link rel="stylesheet" href="static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── SQL Explorer custom styles ─────────────────────────── */
    .explorer-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .explorer-layout { grid-template-columns: 1fr; }
      .sidebar-panel   { display: none; }
    }

    /* Sidebar */
    .sidebar-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 0;
      position: sticky;
      top: 88px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0 20px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .cat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 20px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      border-radius: 0;
    }
    .cat-btn:hover   { background: var(--bg3); }
    .cat-btn.active  { background: rgba(212,175,55,0.12); color: var(--gold); font-weight: 600; }
    .cat-btn .cat-count {
      margin-left: auto;
      font-size: 0.72rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 8px;
      color: var(--muted);
    }
    .cat-btn.active .cat-count { background: rgba(212,175,55,0.18); color: var(--gold); border-color: var(--gold); }

    /* Query cards grid */
    .query-grid {
      display: grid;
      gap: 16px;
    }
    .query-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .query-card:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 24px rgba(212,175,55,0.12);
      transform: translateY(-1px);
    }
    .query-card.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(212,175,55,0.25);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 20px 14px;
    }
    .card-icon {
      font-size: 1.4rem;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-num {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .card-cat-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* SQL preview strip */
    .sql-preview {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: #a8b5d1;
      background: var(--bg1);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 38px;
      line-height: 1.5;
    }

    /* Run button area */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg1);
    }
    .btn-run {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      background: linear-gradient(135deg, #d4af37, #f4cf5c);
      color: #1a1410;
      font-size: 0.8rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
      letter-spacing: 0.03em;
    }
    .btn-run:hover   { opacity: 0.88; transform: scale(1.02); }
    .btn-run:active  { transform: scale(0.98); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .row-badge {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* Result panel */
    .result-panel {
      margin-top: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: none;
    }
    .result-panel.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg1);
    }
    .result-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }
    .result-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .sql-full-block {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem;
      line-height: 1.65;
      background: #0d1117;
      color: #a8b5d1;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
    }
    /* very simple SQL token colouring */
    .kw  { color: #ff79c6; font-weight: 600; }
    .fn  { color: #50fa7b; }
    .str { color: #f1fa8c; }
    .num { color: #bd93f9; }
    .cmt { color: #6272a4; }

    .result-table-wrap {
      overflow-x: auto;
      max-height: 420px;
    }
    .result-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .result-table-wrap thead th {
      position: sticky;
      top: 0;
      background: var(--bg3);
      border-bottom: 2px solid var(--border);
      padding: 10px 14px;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
    }
    .result-table-wrap tbody tr:hover { background: rgba(255,255,255,0.03); }
    .result-table-wrap tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-table-wrap tbody td.null-val { color: var(--muted); font-style: italic; font-size: 0.72rem; }

    /* Hero stats bar */
    .explorer-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .exp-stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 22px;
      flex: 1;
      min-width: 120px;
    }
    .exp-stat-val { font-size: 1.6rem; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--gold); }
    .exp-stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

    /* Search box */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 38px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .empty-filter {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .category-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 16px;
    }
    .category-divider-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      white-space: nowrap;
    }
    .category-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-wrap">
  <div class="container" style="padding-top:32px; padding-bottom:100px;">

    <!-- Page header -->
    <div class="page-header" style="margin-bottom:28px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <span style="font-size:2rem;">🗄️</span>
        <div>
          <h1>SQL Explorer</h1>
          <p class="text-muted">
            Live query showcase · 48 queries covering every SQL concept — run them against real data.
          </p>
        </div>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="explorer-stats">
      <div class="exp-stat">
        <div class="exp-stat-val">48</div>
        <div class="exp-stat-lbl">Total Queries</div>
      </div>
      <div class="exp-stat">
        <div class="exp-stat-val">9</div>
        <div class="exp-stat-lbl">SQL Topics</div>
      </div>
      <div class="exp-stat">
        <div class="exp-stat-val" id="stat-run">0</div>
        <div class="exp-stat-lbl">Queries Run</div>
      </div>
      <div class="exp-stat">
        <div class="exp-stat-val" id="stat-rows">0</div>
        <div class="exp-stat-lbl">Rows Retrieved</div>
      </div>
    </div>

    <!-- Layout -->
    <div class="explorer-layout">

      <!-- Sidebar -->
      <div class="sidebar-panel" id="sidebar">
        <div class="sidebar-title">Topics</div>
        <div id="cat-list"></div>
      </div>

      <!-- Main content -->
      <div>
        <!-- Search -->
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search queries by title, description or SQL keyword…" oninput="filterQueries()" />
        </div>

        <!-- Result panel (floats above cards when a query runs) -->
        <div id="result-panel" class="result-panel">
          <div class="result-header">
            <div>
              <div class="result-title" id="result-title">—</div>
              <div class="result-meta" id="result-meta"></div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="closeResult()">✕ Close</button>
          </div>
          <div class="sql-full-block" id="result-sql"></div>
          <div class="result-table-wrap" id="result-table"></div>
        </div>

        <!-- Card list -->
        <div class="query-grid" id="query-list"></div>
        <div class="empty-filter" id="empty-msg" style="display:none;">No queries match your search.</div>
      </div>
    </div>

  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="static/js/main.js"></script>
<script>
  renderNavbar('sql-explorer.html');

  let allQueries   = [];
  let activeCategory = 'All';
  let runCount     = 0;
  let totalRows    = 0;

  const CATEGORIES = [
    { name: 'All',                  icon: '🌐' },
    { name: 'Basic SELECT',         icon: '📋' },
    { name: 'WHERE & Filtering',    icon: '🔍' },
    { name: 'ORDER BY',             icon: '↕️' },
    { name: 'Aggregate Functions',  icon: '🔢' },
    { name: 'GROUP BY',             icon: '📊' },
    { name: 'HAVING',               icon: '🎯' },
    { name: 'JOINs',                icon: '🔗' },
    { name: 'Subqueries',           icon: '🪆' },
    { name: 'CASE & Computed',      icon: '⚡' },
    { name: 'Views',                icon: '👁️' },
    { name: 'Advanced',             icon: '🚀' },
  ];

  /* ── Load queries from backend ───────────────────────────── */
  async function init() {
    try {
      allQueries = await apiFetch('/sql-explorer/queries');
      buildSidebar();
      renderCards(allQueries);
    } catch (err) {
      document.getElementById('query-list').innerHTML =
        `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Could not load queries</h3><p>${err.message}</p></div>`;
    }
  }

  /* ── Sidebar ─────────────────────────────────────────────── */
  function buildSidebar() {
    const counts = {};
    allQueries.forEach(q => { counts[q.category] = (counts[q.category] || 0) + 1; });

    const list = document.getElementById('cat-list');
    list.innerHTML = CATEGORIES.map(cat => {
      const count = cat.name === 'All' ? allQueries.length : (counts[cat.name] || 0);
      if (cat.name !== 'All' && count === 0) return '';
      return `
        <button class="cat-btn ${cat.name === activeCategory ? 'active' : ''}"
                onclick="selectCategory('${cat.name}', this)">
          <span>${cat.icon}</span>
          <span>${cat.name}</span>
          <span class="cat-count">${count}</span>
        </button>`;
    }).join('');
  }

  function selectCategory(name, btn) {
    activeCategory = name;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterQueries();
  }

  /* ── Filter / search ─────────────────────────────────────── */
  function filterQueries() {
    const term = document.getElementById('search-input').value.toLowerCase().trim();
    let filtered = allQueries;

    if (activeCategory !== 'All') {
      filtered = filtered.filter(q => q.category === activeCategory);
    }
    if (term) {
      filtered = filtered.filter(q =>
        q.title.toLowerCase().includes(term) ||
        q.description.toLowerCase().includes(term) ||
        q.sql.toLowerCase().includes(term)
      );
    }
    renderCards(filtered);
    document.getElementById('empty-msg').style.display = filtered.length ? 'none' : 'block';
  }

  /* ── Render cards ─────────────────────────────────────────── */
  function renderCards(queries) {
    const list = document.getElementById('query-list');

    // Group by category for dividers only when showing "All"
    if (activeCategory === 'All' && !document.getElementById('search-input').value.trim()) {
      const grouped = {};
      queries.forEach(q => {
        if (!grouped[q.category]) grouped[q.category] = [];
        grouped[q.category].push(q);
      });

      let html = '';
      Object.entries(grouped).forEach(([cat, qs]) => {
        html += `
          <div class="category-divider">
            <span class="category-divider-label">${qs[0].icon} ${cat}</span>
            <div class="category-divider-line"></div>
          </div>`;
        qs.forEach(q => { html += cardHTML(q); });
      });
      list.innerHTML = html;
    } else {
      list.innerHTML = queries.map(cardHTML).join('');
    }
  }

  function cardHTML(q) {
    const firstLine = q.sql.split('\n')[0].trim().substring(0, 80);
    return `
      <div class="query-card" id="card-${q.id}">
        <div class="card-header">
          <div class="card-icon">${q.icon}</div>
          <div class="card-meta">
            <div class="card-num">Query #${q.id} · ${q.category}</div>
            <div class="card-title">${q.title}</div>
            <div class="card-desc">${q.description}</div>
          </div>
        </div>
        <div class="sql-preview">${escHtml(firstLine)}${q.sql.split('\n').length > 1 ? '…' : ''}</div>
        <div class="card-footer">
          <button class="btn-run" id="run-btn-${q.id}" onclick="runQuery(${q.id})">
            ▶ Run Query
          </button>
          <span class="row-badge" id="rows-${q.id}"></span>
        </div>
      </div>`;
  }

  /* ── Execute query ───────────────────────────────────────── */
  async function runQuery(id) {
    const btn = document.getElementById(`run-btn-${id}`);
    if (!btn) return;
    btn.innerHTML = '<span class="loader" style="width:12px;height:12px;border-width:2px;"></span> Running…';
    btn.disabled = true;

    // highlight card
    document.querySelectorAll('.query-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${id}`)?.classList.add('active');

    try {
      const res = await apiFetch(`/sql-explorer/run/${id}`, { method: 'POST' });

      runCount++;
      totalRows += res.row_count;
      document.getElementById('stat-run').textContent  = runCount;
      document.getElementById('stat-rows').textContent = totalRows;
      document.getElementById(`rows-${id}`).textContent = `${res.row_count} row${res.row_count !== 1 ? 's' : ''}`;

      showResult(res);
    } catch (err) {
      showToast(err.message || 'Query failed', 'error');
    }

    btn.innerHTML = '▶ Run Query';
    btn.disabled  = false;
  }

  /* ── Result panel ────────────────────────────────────────── */
  function showResult(res) {
    const panel = document.getElementById('result-panel');
    document.getElementById('result-title').textContent = res.title;
    document.getElementById('result-meta').textContent  =
      `${res.row_count} row${res.row_count !== 1 ? 's' : ''} returned`;

    document.getElementById('result-sql').innerHTML = highlightSQL(res.sql);

    if (!res.columns.length) {
      document.getElementById('result-table').innerHTML =
        '<div style="padding:20px;color:var(--muted);font-size:0.85rem;">No rows returned.</div>';
    } else {
      const headers = res.columns.map(c => `<th>${escHtml(c)}</th>`).join('');
      const rows = res.rows.map(row =>
        '<tr>' + row.map(val =>
          val === null
            ? '<td class="null-val">NULL</td>'
            : `<td title="${escHtml(String(val))}">${escHtml(String(val))}</td>`
        ).join('') + '</tr>'
      ).join('');
      document.getElementById('result-table').innerHTML =
        `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
    }

    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closeResult() {
    document.getElementById('result-panel').classList.remove('visible');
    document.querySelectorAll('.query-card').forEach(c => c.classList.remove('active'));
  }

  /* ── Helpers ─────────────────────────────────────────────── */
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function highlightSQL(sql) {
    const KEYWORDS = [
      'SELECT','FROM','WHERE','JOIN','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN',
      'ON','GROUP BY','ORDER BY','HAVING','INSERT INTO','UPDATE','DELETE','SET',
      'AND','OR','NOT','IN','EXISTS','BETWEEN','LIKE','IS NULL','IS NOT NULL',
      'DISTINCT','TOP','AS','WITH','CASE','WHEN','THEN','ELSE','END',
      'COUNT','SUM','AVG','MIN','MAX','CONCAT','LEN','UPPER','LOWER',
      'CAST','ISNULL','COALESCE','RANK','ROW_NUMBER','OVER','PARTITION BY',
      'DATEDIFF','GETDATE','FORMAT','CHARINDEX','LEFT','RIGHT',
      'BEGIN','COMMIT','ROLLBACK','TRANSACTION','CREATE','DROP','ALTER','INTO',
      'VALUES','NULL','BY','DESC','ASC','DECLARE','EXEC','PROCEDURE','TRIGGER',
    ].sort((a,b) => b.length - a.length);

    let out = escHtml(sql);

    // comments
    out = out.replace(/(--[^\n]*)/g, '<span class="cmt">$1</span>');

    // strings
    out = out.replace(/'([^']*)'/g, "<span class=\"str\">'$1'</span>");

    // numbers
    out = out.replace(/\b(\d+(\.\d+)?)\b/g, '<span class="num">$1</span>');

    // keywords (case-insensitive, word-boundary)
    KEYWORDS.forEach(kw => {
      const rx = new RegExp(`\\b(${kw})\\b`, 'gi');
      out = out.replace(rx, '<span class="kw">$1</span>');
    });

    return out;
  }

  init();
</script>
</body>
</html>
